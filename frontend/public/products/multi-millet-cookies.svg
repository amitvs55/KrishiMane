<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <!-- Multi-Millet Cookie Icon -->
  <!-- Cookie shadow -->
  <ellipse cx="155" cy="255" rx="75" ry="12" fill="#6B4F1A" opacity="0.12"/>
  <!-- Main cookie body -->
  <circle cx="150" cy="145" r="85" fill="#C4956A"/>
  <!-- Cookie edge texture -->
  <circle cx="150" cy="145" r="80" fill="#CDA478"/>
  <!-- Inner cookie surface -->
  <circle cx="150" cy="142" r="74" fill="#D8B088"/>
  <!-- Multi-colored chips representing different millets -->
  <!-- Ragi (reddish-brown) -->
  <circle cx="120" cy="112" r="8" fill="#8B4513" opacity="0.7"/>
  <circle cx="165" cy="175" r="7" fill="#8B4513" opacity="0.65"/>
  <circle cx="110" cy="168" r="6" fill="#A0522D" opacity="0.6"/>
  <!-- Bajra (dark golden) -->
  <circle cx="175" cy="115" r="7" fill="#6B4F1A" opacity="0.65"/>
  <circle cx="130" cy="160" r="8" fill="#6B4F1A" opacity="0.6"/>
  <circle cx="180" cy="155" r="5" fill="#6B4F1A" opacity="0.55"/>
  <!-- Jowar (golden-amber) -->
  <circle cx="148" cy="130" r="8" fill="#D4A017" opacity="0.65"/>
  <circle cx="190" cy="138" r="6" fill="#DAA520" opacity="0.6"/>
  <circle cx="120" cy="140" r="5" fill="#D4A017" opacity="0.55"/>
  <!-- Wheat (light golden) -->
  <circle cx="155" cy="100" r="6" fill="#B8860B" opacity="0.55"/>
  <circle cx="140" cy="185" r="7" fill="#B8860B" opacity="0.6"/>
  <!-- Chana (beige) -->
  <circle cx="170" cy="145" r="6" fill="#D2B48C" opacity="0.5"/>
  <circle cx="135" cy="108" r="5" fill="#D2B48C" opacity="0.45"/>
  <!-- Small mixed grain specks -->
  <circle cx="160" cy="190" r="3" fill="#8B4513" opacity="0.4"/>
  <circle cx="105" cy="150" r="3" fill="#D4A017" opacity="0.4"/>
  <circle cx="188" cy="125" r="3" fill="#6B4F1A" opacity="0.4"/>
  <circle cx="128" cy="125" r="2.5" fill="#A0522D" opacity="0.35"/>
  <circle cx="155" cy="155" r="2.5" fill="#DAA520" opacity="0.35"/>
  <!-- Surface cracks -->
  <path d="M125 125 Q138 135 130 155" stroke="#A08050" stroke-width="1" fill="none" opacity="0.2"/>
  <path d="M170 120 Q178 132 172 148" stroke="#A08050" stroke-width="1" fill="none" opacity="0.2"/>
  <!-- Highlight -->
  <ellipse cx="133" cy="115" rx="25" ry="15" fill="#E8C8A0" opacity="0.3" transform="rotate(-20 133 115)"/>
</svg>