<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <!-- Ragi Cookie Icon -->
  <!-- Cookie shadow -->
  <ellipse cx="155" cy="255" rx="75" ry="12" fill="#5C3317" opacity="0.12"/>
  <!-- Main cookie body -->
  <circle cx="150" cy="145" r="85" fill="#A0522D"/>
  <!-- Cookie edge texture (slightly irregular) -->
  <circle cx="150" cy="145" r="80" fill="#B5653A"/>
  <!-- Inner cookie surface -->
  <circle cx="150" cy="142" r="74" fill="#C07040"/>
  <!-- Chocolate chips / texture dots -->
  <circle cx="120" cy="115" r="8" fill="#5C3317" opacity="0.7"/>
  <circle cx="170" cy="108" r="7" fill="#5C3317" opacity="0.65"/>
  <circle cx="145" cy="155" r="9" fill="#5C3317" opacity="0.7"/>
  <circle cx="180" cy="150" r="6" fill="#5C3317" opacity="0.6"/>
  <circle cx="115" cy="165" r="7" fill="#5C3317" opacity="0.65"/>
  <circle cx="160" cy="180" r="8" fill="#5C3317" opacity="0.7"/>
  <circle cx="130" cy="135" r="5" fill="#5C3317" opacity="0.5"/>
  <circle cx="175" cy="130" r="6" fill="#5C3317" opacity="0.55"/>
  <!-- Small ragi grain specks -->
  <circle cx="135" cy="100" r="3" fill="#8B4513" opacity="0.5"/>
  <circle cx="190" cy="140" r="3" fill="#8B4513" opacity="0.5"/>
  <circle cx="110" cy="145" r="3" fill="#8B4513" opacity="0.5"/>
  <circle cx="155" cy="195" r="3" fill="#8B4513" opacity="0.5"/>
  <circle cx="140" cy="175" r="2.5" fill="#8B4513" opacity="0.45"/>
  <!-- Surface cracks for texture -->
  <path d="M120 130 Q135 140 125 160" stroke="#8B4513" stroke-width="1" fill="none" opacity="0.25"/>
  <path d="M165 120 Q175 135 170 155" stroke="#8B4513" stroke-width="1" fill="none" opacity="0.2"/>
  <!-- Highlight -->
  <ellipse cx="135" cy="115" rx="25" ry="15" fill="#D4895A" opacity="0.3" transform="rotate(-20 135 115)"/>
</svg>