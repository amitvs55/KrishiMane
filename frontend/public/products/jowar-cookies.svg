  <circle cx="174" cy="110" r="7" fill="#B8860B" opacity="0.55"/>
  <circle cx="146" cy="156" r="9" fill="#B8860B" opacity="0.6"/>
  <circle cx="184" cy="146" r="6" fill="#B8860B" opacity="0.5"/>
